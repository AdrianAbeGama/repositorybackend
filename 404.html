<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            text-align: center;
            padding: 5rem 1rem;
        }
        .error-code {
            font-size: 6rem;
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mi Aplicación Web</h1>
    </header>
    
    <main>
        <div class="error-container">
            <div class="error-code">404</div>
            <div class="error-message">Página no encontrada</div>
            <p>Lo sentimos, la página que estás buscando no existe.</p>
            <a href="/" class="btn">Volver al inicio</a>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2023 Mi Aplicación Web. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
